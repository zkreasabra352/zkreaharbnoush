<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير النظام | الاحترافي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>

<body>
    <!-- شاشة التحميل -->
    <div id="loadingScreen" class="loading-screen">
        <div style="text-align:center;">
            <i class="fas fa-spinner fa-spin fa-3x"></i>
            <p style="margin-top:15px;">جاري تحميل التقارير...</p>
        </div>
    </div>

    <div id="appContent" style="display:none;">
        <div class="app-wrapper">
            <aside class="sidebar">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>التقارير</span>
                </div>
                <nav>
                    <a href="index.html"><i class="fas fa-users"></i> الزبائن</a>
                    <a href="#" class="active"><i class="fas fa-chart-line"></i> التقارير</a>
                    <a href="logs.html"><i class="fas fa-list"></i> السجلات</a>
                    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</a>
                </nav>
            </aside>

            <main class="main-content">
                <header class="top-bar">
                    <div class="user-info">
                        <i class="fas fa-chart-line"></i> تقارير الدفعات اليومية
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <!-- فلاتر متقدمة -->
                        <div style="display:flex; gap:8px; align-items:center;">
                            <input type="date" id="reportDate" style="padding:8px 12px; width:160px; border-radius:8px; border:1px solid #d1d5db;">
                            <button onclick="generateReport()" class="btn btn-primary" style="padding:8px 16px;">
                                <i class="fas fa-search"></i> فلترة
                            </button>
                            <button onclick="showAllReport()" class="btn btn-secondary" style="padding:8px 16px;">
                                <i class="fas fa-list"></i> عرض الكل
                            </button>
                            <button onclick="exportToExcel()" class="btn btn-success" style="padding:8px 16px;">
                                <i class="fas fa-file-excel"></i> Excel
                            </button>
                            <button onclick="printReport()" class="btn btn-info" style="padding:8px 16px;">
                                <i class="fas fa-print"></i> طباعة
                            </button>
                        </div>
                        <span id="reportCount" style="font-weight:700; color:#10b981; background:#f0fdf4; padding:6px 12px; border-radius:20px;">الدفعات: 0</span>
                    </div>
                </header>

                <!-- إحصائيات سريعة -->
                <div class="container" style="margin-bottom:20px;">
                    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:15px;">
                        <div class="card" style="background:linear-gradient(135deg, #10b981, #059669); color:white; text-align:center; padding:20px; border-radius:12px;">
                            <i class="fas fa-file-invoice-dollar fa-2x" style="margin-bottom:10px;"></i>
                            <div style="font-size:24px; font-weight:700;" id="totalPayments">0</div>
                            <div>إجمالي الدفعات</div>
                        </div>
                        <div class="card" style="background:linear-gradient(135deg, #3b82f6, #1d4ed8); color:white; text-align:center; padding:20px; border-radius:12px;">
                            <i class="fas fa-users fa-2x" style="margin-bottom:10px;"></i>
                            <div style="font-size:24px; font-weight:700;" id="totalCustomers">0</div>
                            <div>عدد الزبائن</div>
                        </div>
                    </div>
                </div>

                <div class="container">
                    <div class="card table-card">
                        <div class="table-responsive">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width:180px;">الاسم العربي</th>
                                        <th style="width:150px;">English Name</th>
                                        <th style="width:100px;">المبلغ</th>
                                        <th style="width:100px;">الباقي</th>
                                        <th style="width:120px;">السرعة</th>
                                        <th>ملاحظة</th>
                                        <th style="width:120px;">تاريخ الدفعة</th>
                                    </tr>
                                </thead>
                                <tbody id="reportTableBody">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="toast" class="toast-notification"></div>
    <script src="reports.js"></script>
</body>
</html>
