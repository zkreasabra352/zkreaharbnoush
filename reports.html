<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير النظام | النظام الاحترافي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>

<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-shield-halved"></i>
                <span>لوحة التحكم</span>
            </div>
            <nav>
                <a href="index.html"><i class="fas fa-users"></i> الزبائن</a>
                <a href="#" class="active"><i class="fas fa-chart-line"></i> التقارير</a>
                <a href="logs.html"><i class="fas fa-list"></i> السجلات</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">تقارير الدفعات</div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="date" id="reportDate" style="padding:5px 10px; width:150px;">
                    <button onclick="generateReport()" class="btn btn-primary">
                        <i class="fas fa-filter"></i> عرض حسب التاريخ
                    </button>
                    <button onclick="showAllReport()" class="btn btn-secondary">
                        <i class="fas fa-list"></i> عرض الكل
                    </button>
                    <span id="reportCount" style="font-weight:700; margin-right:10px;">عدد الدفعات: 0</span>
                </div>
            </header>

            <div class="container">
                <div class="card table-card">
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>الاسم العربي</th>
                                    <th>English Name</th>
                                    <th>المبلغ</th>
                                    <th>الباقي</th>
                                    <th>السرعة</th>
                                    <th>ملاحظة</th>
                                    <th>تاريخ الدفعة</th>
                                </tr>
                            </thead>
                            <tbody id="reportTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
    </div>
    </main>
    </div>

    <script src="reports.js"></script>
</body>

</html>
