<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الزبائن</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <style>
        /* إضافة هذا الكود لإخفاء المحتوى حتى يتم التحقق من الدخول */
        body {
            display: none;
        }

        body.loaded {
            display: block;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1e1b4b;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>

<body>
    <!-- شاشة تحميل أثناء التحقق -->
    <div id="loadingScreen" class="loading-screen">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin fa-3x"></i>
            <p style="margin-top: 15px;">جاري التحقق من بيانات الدخول...</p>
        </div>
    </div>

    <!-- محتوى النظام -->
    <div id="appContent" style="display: none;">
        <div id="selectionBar" class="selection-bar">
            <div class="selection-info">
                تم تحديد: <span id="selectedCount">0</span>
            </div>
            <div class="selection-actions">
                <button class="btn btn-edit-alt" onclick="editSelected()">
                    <i class="fas fa-pen"></i> تعديل
                </button>
                <button class="btn btn-danger-alt" onclick="deleteSelected()">
                    <i class="fas fa-trash"></i> حذف المحدد
                </button>
                <button class="btn btn-secondary-alt" onclick="clearSelection()">
                    إلغاء
                </button>
            </div>
        </div>

        <div class="app-wrapper">
            <aside class="sidebar">
                <div class="logo">
                    <i class="fas fa-shield-halved"></i>
                    <span>لوحة التحكم</span>
                </div>
                <nav>
                    <a href="index.html" class="active"><i class="fas fa-users"></i> الزبائن</a>
                    <a href="reports.html"><i class="fas fa-chart-line"></i> التقارير</a>
                    <a href="logs.html"><i class="fas fa-list"></i> السجلات</a>
                    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</a>
                </nav>
            </aside>

            <main class="main-content">
                <header class="top-bar">

                    <div class="user-info">إدارة قاعدة الزبائن</div>

                    <div style="display:flex; align-items:center; gap:10px;">

                        <button id="addCustomerBtn" class="btn btn-primary">
                            <i class="fas fa-plus"></i> إضافة زبون جديد
                        </button>

                        <input type="text" id="customerSearch" placeholder="ابحث باسم الزبون..."
                            style="padding:5px 10px; width:200px;">

                        <span id="totalCustomers" style="font-weight:700;">العدد: 0</span>

                        <!-- قائمة الحساب -->
                        <div class="account-menu">
                            <button id="accountBtn" class="account-btn">
                                <i class="fas fa-user-circle"></i>
                            </button>

                            <div id="accountDropdown" class="account-dropdown">

                                <div class="account-info">
                                    <div id="accountName">...</div>
                                    <div id="accountEmail">...</div>
                                </div>

                                <div class="account-divider"></div>

                                <button onclick="logout()" class="logout-btn">
                                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                                </button>

                            </div>
                        </div>

                    </div>

                </header>

                <div class="container">
                    <div class="card table-card">
                        <div class="table-responsive">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width: 50px;">
                                            <input type="checkbox" id="selectAll" onclick="toggleSelectAll()">
                                        </th>
                                        <th>الاسم العربي</th>
                                        <th>English Name</th>
                                        <th>ملاحظات</th>
                                        <th>تاريخ الانضمام</th>
                                        <th>السجلات</th>
                                    </tr>
                                </thead>
                                <tbody id="customersTable">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="customerModalTitle">بيانات الزبون</h2>
                <span class="modal-close" onclick="closeCustomerModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>الاسم بالعربي</label>
                    <input type="text" id="customerNameAr" placeholder="أدخل الاسم الكامل">
                </div>
                <div class="form-group">
                    <label>الاسم بالإنكليزي</label>
                    <input type="text" id="customerNameEn" placeholder="Full English Name">
                </div>
                <div class="form-group">
                    <label>ملاحظات إضافية</label>
                    <textarea id="customerNote" rows="3" placeholder="أي تفاصيل أخرى..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeCustomerModal()">إلغاء</button>
                <button class="btn btn-primary" id="saveCustomerBtn">حفظ البيانات</button>
            </div>
        </div>
    </div>

    <!-- Firebase Config -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDeKBkk7OjILKwmfNaNr1J-8c99WeRk_Y8",
            authDomain: "company-payments-system.firebaseapp.com",
            projectId: "company-payments-system",
            storageBucket: "company-payments-system.firebasestorage.app",
            messagingSenderId: "827863505736",
            appId: "1:827863505736:web:2d924cfcc7c3a45415b17d",
            measurementId: "G-0V1KLHFT35"
        };

        // تهيئة Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // دالة التحقق من حالة الدخول
        auth.onAuthStateChanged(user => {
            const loadingScreen = document.getElementById('loadingScreen');
            const appContent = document.getElementById('appContent');
            const body = document.body;

            if (user) {
                // المستخدم مسجل دخول
                loadingScreen.style.display = 'none';
                appContent.style.display = 'block';
                body.style.display = 'block';
                body.classList.add('loaded');

                // هنا يمكنك استدعاء دالة تحميل البيانات من script.js
                if (typeof loadCustomers === 'function') {
                    loadCustomers();
                }
            } else {
                // المستخدم غير مسجل، نوجهه لصفحة تسجيل الدخول
                loadingScreen.innerHTML = '<div style="text-align: center;"><i class="fas fa-lock fa-3x"></i><p style="margin-top: 15px;">يجب تسجيل الدخول للمتابعة</p></div>';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1000);
            }
        });

        // دالة تسجيل الخروج
        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            }).catch((error) => {
                console.error("Error signing out:", error);
            });
        }
    </script>

    <!-- استدعاء ملف سكربت النظام -->
    <script src="script.js"></script>
    <div id="toast" class="toast-notification"></div>
</body>

</html>
