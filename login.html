<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة الزبائن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(console.log);
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            direction: rtl;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .logo i {
            margin-left: 10px;
            color: #4f46e5;
        }

        h2 {
            color: #1e293b;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            position: relative;
            margin-bottom: 25px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            transform: translateY(-2px);
        }

        .password-toggle {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            cursor: pointer;
            font-size: 18px;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .spinner {
            display: none;
            border: 2px solid #ffffff20;
            border-top: 2px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg {
            display: none;
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-right: 4px solid #dc2626;
            font-weight: 500;
            align-items: center;
            gap: 10px;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            color: #6b7280;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 25px;
                margin: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-shield-halved"></i>
            <span>نظام الزبائن</span>
        </div>
        
        <h2>تسجيل الدخول</h2>
        
        <div class="error-msg" id="errorMsg">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText">حدث خطأ في تسجيل الدخول</span>
        </div>

        <form onsubmit="event.preventDefault(); login();">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> كلمة المرور</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <span id="btnText">دخول النظام</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>

        <div class="footer">
            <p>💙 نظام إدارة الزبائن المتكامل</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <!-- 🔥 الـ SCRIPT الوحيد والآمن -->
    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDeKBkk7OjILKwmfNaNr1J-8c99WeRk_Y8",
            authDomain: "company-payments-system.firebaseapp.com",
            projectId: "company-payments-system",
            storageBucket: "company-payments-system.firebasestorage.app",
            messagingSenderId: "827863505736",
            appId: "1:827863505736:web:2d924cfcc7c3a45415b17d",
            measurementId: "G-0V1KLHFT35"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();

        // 🔥 PWA جاهز
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        // دالة تسجيل الدخول الآمنة
        function login() {
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            
            if (!email || !password) {
                alert('يرجى إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }

            // إخفاء الخطأ + إظهار spinner
            if (errorMsg) errorMsg.style.display = 'none';
            if (spinner) spinner.style.display = 'block';
            if (btnText) btnText.style.display = 'none';
            
            auth.signInWithEmailAndPassword(email.value.trim(), password.value)
                .then((userCredential) => {
                    // تسجيل الدخول ناجح!
                    console.log('✅ تسجيل دخول ناجح');
                    
                    // عرض PWA prompt
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        deferredPrompt.userChoice.then((choiceResult) => {
                            if (choiceResult.outcome === 'accepted') {
                                console.log('✅ المستخدم ثبت التطبيق');
                            }
                            deferredPrompt = null;
                        });
                    }
                    
                    // الانتقال للصفحة الرئيسية
                    window.location.href = './index.html';
                })
                .catch((error) => {
                    console.error('خطأ تسجيل الدخول:', error);
                    
                    // إخفاء spinner
                    if (spinner) spinner.style.display = 'none';
                    if (btnText) btnText.style.display = 'block';
                    
                    // رسائل خطأ واضحة
                    let message = 'خطأ في تسجيل الدخول';
                    switch(error.code) {
                        case 'auth/user-not-found': 
                            message = 'لا يوجد حساب بهذا البريد الإلكتروني'; 
                            break;
                        case 'auth/wrong-password': 
                            message = 'كلمة المرور غير صحيحة'; 
                            break;
                        case 'auth/invalid-email': 
                            message = 'صيغة البريد الإلكتروني غير صحيحة'; 
                            break;
                        case 'auth/too-many-requests': 
                            message = 'عدد كبير من المحاولات، جرب بعد دقيقة'; 
                            break;
                        case 'auth/network-request-failed':
                            message = 'مشكلة في الاتصال، تحقق من الإنترنت';
                            break;
                        default:
                            message = error.message;
                    }
                    
                    if (errorText) errorText.textContent = message;
                    if (errorMsg) errorMsg.style.display = 'flex';
                });
        }

        // إعادة توجيه المستخدمين المسجلين دخولهم
        auth.onAuthStateChanged((user) => {
            if (user) {
                // إذا كان مسجل دخول، اذهب للصفحة الرئيسية
                window.location.href = './index.html';
            }
        });

        // 🔥 تبديل كلمة المرور (آمن)
        function initPasswordToggle() {
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            
            if (toggleBtn && passwordInput) {
                toggleBtn.onclick = () => {
                    const type = passwordInput.type === 'password' ? 'text' : 'password';
                    passwordInput.type = type;
                    toggleBtn.classList.toggle('fa-eye-slash');
                };
            }
        }

        // Enter يسجل دخول
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
                login();
            }
        });

        // تشغيل عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            initPasswordToggle();
        });

        // حالة الاتصال
        window.addEventListener('online', () => {
            console.log('✅ متصل بالإنترنت');
        });

        window.addEventListener('offline', () => {
            console.log('⚠️ غير متصل');
        });
    </script>
</body>
</html>
