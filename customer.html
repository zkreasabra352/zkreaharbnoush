<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفعات الزبون | النظام</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <!-- 🔥 PWA موظفين -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
    </script>

    <style>
        body {
            display: none;
        }

        body.loaded {
            display: block;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1e1b4b;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>

<body>
    <!-- شاشة تحميل -->
    <div id="loadingScreen" class="loading-screen">
        <div style="text-align: center;">
            <i class="fas fa-spinner fa-spin fa-3x"></i>
            <p style="margin-top: 15px;">جاري التحقق من بيانات الدخول...</p>
        </div>
    </div>

    <!-- محتوى الصفحة -->
    <div id="appContent" style="display: none;">
        <div id="paymentSelectionBar" class="selection-bar">
            <div class="selection-info">
                تم تحديد: <span id="selectedPaymentsCount">0</span>
            </div>
            <div class="selection-actions">
                <button class="btn btn-edit-alt" onclick="editSelectedPayments()">
                    <i class="fas fa-pen"></i> تعديل
                </button>
                <button class="btn btn-danger-alt" onclick="deleteSelectedPayments()">
                    <i class="fas fa-trash"></i> حذف المحدد
                </button>
                <button class="btn btn-secondary-alt" onclick="clearPaymentsSelection()">
                    إلغاء
                </button>
            </div>
        </div>
        <div class="app-wrapper">
            <aside class="sidebar">
                <div class="logo">
                    <i class="fas fa-wallet"></i>
                    <span>المالية</span>
                </div>
                <nav>
                    <a href="index.html"><i class="fas fa-users"></i> الزبائن</a>
                    <a href="#" class="active"><i class="fas fa-file-invoice-dollar"></i> الدفعات</a>
                    <a href="index.html"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
                    <a href="logs.html"><i class="fas fa-list"></i> السجلات</a>
                </nav>
            </aside>

            <main class="main-content">
                <header class="top-bar">
                    <div class="user-info">سجل دفعات الزبون</div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <button id="addPaymentBtn" class="btn btn-primary">
                            <i class="fas fa-plus"></i> إضافة دفعة جديدة
                        </button>
                        <button onclick="printCustomerInvoice()" class="btn btn-secondary">
                            <i class="fas fa-print"></i> طباعة الفاتورة
                        </button>
                        <button onclick="goToDebts()" class="btn btn-warning">
                            <i class="fas fa-credit-card"></i> الديون
                        </button>
                        <input type="date" id="paymentDateFilter" onchange="filterPaymentsByDate()"
                            style="padding:5px 10px; margin-left:10px; width:150px;">
                        <span id="paymentsCount" style="font-weight:700;">عدد الدفعات: 0</span>
                    </div>
                </header>

                <div class="container">
                    <div id="customerInfo" style="
background:#eef2ff;
padding:12px 18px;
border-radius:10px;
margin-bottom:15px;
font-weight:700;
color:#3730a3;
">
                        الزبون: <span id="customerNameTitle">...</span>
                    </div>
                    <div class="card table-card">
                        <div class="table-responsive">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width:50px;">
                                            <input type="checkbox" id="selectAllPayments"
                                                onclick="toggleSelectAllPayments()">
                                        </th>
                                        <th>المبلغ</th>
                                        <th>الباقي</th>
                                        <th>السرعة</th>
                                        <th>ملاحظة</th>
                                        <th>تاريخ الدفعة</th>
                                    </tr>
                                </thead>
                                <tbody id="paymentsTable">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="paymentModalTitle">إضافة دفعة</h2>
                <span class="modal-close" onclick="closePaymentModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label><i class="fas fa-money-bill-wave"></i> المبلغ</label>
                    <input type="text" id="paymentAmount" placeholder="مثلاً: 10$ أو 150">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-hand-holding-dollar"></i> المبلغ المتبقي</label>
                    <input type="text" id="paymentRemaining" placeholder="مثلاً: 10$ أو 150">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-tachometer-alt"></i> السرعة المطلوبة</label>
                    <input type="text" id="paymentSpeed" placeholder="مثلاً: 50 Mbps">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> تاريخ الدفعة</label>
                    <input type="date" id="paymentDate">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-comment-dots"></i> ملاحظات إضافية</label>
                    <textarea id="paymentNote" rows="3" placeholder="اكتب تفاصيل إضافية هنا..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePaymentModal()">إلغاء</button>
                <button class="btn btn-primary" id="savePaymentBtn">حفظ الدفعة</button>
            </div>
        </div>
    </div>

    <div id="invoiceTemplate" style="display:none; direction:rtl; font-family:Cairo; padding:20px; font-size:11px;">
        <h2 style="text-align:center; font-size:16px; margin-bottom:10px;">فاتورة دفعات الزبون</h2>
        <div style="margin-bottom:10px; font-size:10px;">
            <strong>الاسم:</strong> <span id="invNameAr"></span><br>
            <strong>English Name:</strong> <span id="invNameEn"></span><br>
            <strong>التاريخ:</strong> <span id="invDate"></span>
        </div>
        <table border="1" width="100%" cellspacing="0" cellpadding="5"
            style="border-collapse:collapse; text-align:center; font-size:9px;">
            <thead style="background:#4f46e5; color:white;">
                <tr>
                    <th>المبلغ</th>
                    <th>الباقي</th>
                    <th>السرعة</th>
                    <th>ملاحظة</th>
                    <th>تاريخ الدفعة</th>
                </tr>
            </thead>
            <tbody id="invTableBody"></tbody>
        </table>
    </div>

    <!-- Firebase Config -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDeKBkk7OjILKwmfNaNr1J-8c99WeRk_Y8",
            authDomain: "company-payments-system.firebaseapp.com",
            projectId: "company-payments-system",
            storageBucket: "company-payments-system.firebasestorage.app",
            messagingSenderId: "827863505736",
            appId: "1:827863505736:web:2d924cfcc7c3a45415b17d",
            measurementId: "G-0V1KLHFT35"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            const loadingScreen = document.getElementById('loadingScreen');
            const appContent = document.getElementById('appContent');
            const body = document.body;

            if (user) {
                loadingScreen.style.display = 'none';
                appContent.style.display = 'block';
                body.style.display = 'block';
                body.classList.add('loaded');

                if (typeof loadPayments === 'function') {
                    loadPayments();
                }

                if (typeof loadCustomerName === 'function') {
                    loadCustomerName();
                }
            } else {
                loadingScreen.innerHTML = '<div style="text-align: center;"><i class="fas fa-lock fa-3x"></i><p style="margin-top: 15px;">يجب تسجيل الدخول للمتابعة</p></div>';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1000);
            }
        });

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            }).catch((error) => {
                console.error("Error signing out:", error);
            });
        }
    </script>

    <script src="script.js"></script>
    <div id="toast" class="toast-notification"></div>
</body>

</html>
